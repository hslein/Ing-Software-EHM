services:
  - type: web
    name: ehm-back
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build:back
    startCommand: npm run start:back:render
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: POSTGRES_SSL
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
    buildFilter:
      paths:
        - apps/ehm_back/**
        - package.json
        - package-lock.json
        - nx.json
        - tsconfig*.json

  - type: web
    name: ehm-front
    runtime: static
    buildCommand: npm ci && npm run build:front
    staticPublishPath: apps/ehm_front/dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    buildFilter:
      paths:
        - apps/ehm_front/**
        - package.json
        - package-lock.json
        - nx.json
        - tsconfig*.json
